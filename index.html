<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Networking Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Optional: Lucide Icons for aesthetic UI elements -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Custom loader animation */
    .loader {
      border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; 
      border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
  <script>
    // Request permissions for camera, location, and contacts
    navigator.permissions.query({ name: 'camera' }).then((result) => {
      if (result.state !== 'granted') {
        result.onchange = () => {
          if (result.state === 'granted') {
            console.log('Camera permission granted');
          }
        };
        result.request().then((permissionStatus) => {
          if (permissionStatus.state === 'granted') {
            console.log('Camera permission granted');
          }
        });
      }
    });

    navigator.permissions.query({ name: 'geolocation' }).then((result) => {
      if (result.state !== 'granted') {
        result.onchange = () => {
          if (result.state === 'granted') {
            console.log('Location permission granted');
          }
        };
        result.request().then((permissionStatus) => {
          if (permissionStatus.state === 'granted') {
            console.log('Location permission granted');
          }
        });
      }
    });

    navigator.permissions.query({ name: 'contacts' }).then((result) => {
      if (result.state !== 'granted') {
        result.onchange = () => {
          if (result.state === 'granted') {
            console.log('Contacts permission granted');
          }
        };
        result.request().then((permissionStatus) => {
          if (permissionStatus.state === 'granted') {
            console.log('Contacts permission granted');
          }
        });
      }
    });
  </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">
  
  <!-- Your existing HTML content -->
</body>
</html>
